# ---------------------------------------------------------------------------
# Datasource — PostgreSQL
#
# The application runs on a shared, durable PostgreSQL in every environment. This
# is what makes a cluster of wallet servers correct: every node points at the
# SAME database, so the pessimistic row locks and the idempotency-key unique
# constraint are enforced across all nodes, not just within one JVM.
#
# Connection details default to a local Postgres but every value is overridable
# by an environment variable, so real credentials are injected at deploy time and
# never committed. Start a local Postgres with:
#   docker run -d --name wallet-pg -p 5432:5432 \
#     -e POSTGRES_DB=wallet -e POSTGRES_USER=wallet -e POSTGRES_PASSWORD=wallet \
#     postgres:16-alpine
# ---------------------------------------------------------------------------
spring.datasource.url=${WALLET_DB_URL:jdbc:postgresql://localhost:5432/wallet}
spring.datasource.username=${WALLET_DB_USERNAME:wallet}
spring.datasource.password=${WALLET_DB_PASSWORD:wallet}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns the schema (src/main/resources/db/migration); Hibernate only
# validates that the entities match the migrated schema.
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Serialise Instant as ISO-8601 strings instead of numeric timestamps.
spring.jackson.serialization.write-dates-as-timestamps=false

# ---------------------------------------------------------------------------
# OAuth 2.0 (client-credentials)
#
# The API is a stateless OAuth2 resource server: /accounts and /transfers
# require a JWT bearer token. A single static demo client is configured here so
# the project runs with zero external setup - in production these credentials
# would live in a real Authorization Server and only `issuer-uri` would remain.
#   wallet.read  -> required for GET endpoints
#   wallet.write -> required for POST endpoints
#
# The id/secret default to the demo values so the project runs out of the box,
# but each can be overridden by an environment variable - so a REAL secret is
# injected at deploy time and never committed to source control:
#   WALLET_SECURITY_CLIENT_ID, WALLET_SECURITY_CLIENT_SECRET
# Obtain a token:
#   curl -s -X POST http://localhost:8080/oauth/token \
#     -d grant_type=client_credentials -d client_id=demo-client \
#     -d client_secret=demo-secret
# ---------------------------------------------------------------------------
wallet.security.client-id=${WALLET_SECURITY_CLIENT_ID:demo-client}
wallet.security.client-secret=${WALLET_SECURITY_CLIENT_SECRET:demo-secret}
wallet.security.scopes=wallet.read wallet.write
wallet.security.token-ttl-seconds=3600
wallet.security.issuer=java-wallet

# ---------------------------------------------------------------------------
# Logging
#
# Business events (account created, money moved, token issued) log at INFO;
# per-step detail (lock acquisition, request shape) at DEBUG on the app package.
#
# Output FORMAT is defined in logback-spring.xml: a readable console by default,
# and one-JSON-object-per-line when the `prod` profile is active
# (--spring.profiles.active=prod). Every line carries a `requestId` correlation
# id set by RequestCorrelationFilter. Levels below still apply to both formats.
# ---------------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.wallet=DEBUG
logging.level.org.springframework.security=INFO

# Swagger UI / OpenAPI (springdoc). Interactive docs at /swagger-ui.html,
# raw OpenAPI 3 spec at /v3/api-docs. Operations are sorted by HTTP method.
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.api-docs.path=/v3/api-docs

server.port=8080
