# ---------------------------------------------------------------------------
# `postgres` profile — the shared, durable datastore for real / clustered
# deployments. Activate with:  --spring.profiles.active=postgres  (or
# SPRING_PROFILES_ACTIVE=postgres).
#
# This is what makes a cluster of wallet servers actually correct: every node
# points at the SAME PostgreSQL, so the pessimistic row locks and the
# idempotency-key unique constraint are enforced across all nodes, not just
# within one JVM.
#
# Connection details default to a local Postgres but every value is overridable
# by an environment variable, so real credentials are injected at deploy time
# and never committed.
# ---------------------------------------------------------------------------
spring.datasource.url=${WALLET_DB_URL:jdbc:postgresql://localhost:5432/wallet}
spring.datasource.username=${WALLET_DB_USERNAME:wallet}
spring.datasource.password=${WALLET_DB_PASSWORD:wallet}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns the schema; Hibernate only validates that the entities match it.
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate

# The H2 dev console has no place in a production deployment.
spring.h2.console.enabled=false
