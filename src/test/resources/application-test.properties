# ---------------------------------------------------------------------------
# `test` profile — used ONLY by the fast unit/concurrency tests
# (WalletServiceTest, WalletServiceConcurrencyTest) so they run in-memory with
# no Docker and no external database. Activated via @ActiveProfiles("test").
#
# This overrides the datasource from the application default (PostgreSQL); all
# other settings (OAuth, logging, etc.) are inherited from application.properties.
# The cross-node WalletClusterConcurrencyTest does NOT use this profile — it runs
# against a real PostgreSQL (Testcontainers).
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:wallet;DB_CLOSE_DELAY=-1;LOCK_TIMEOUT=10000
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 has no Flyway migrations; let Hibernate create the schema from the entities.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
